<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Minh Trang!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffe4e1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- 1. MÀN HÌNH NHẬP CODE --- */
        #auth-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffb6c1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        .box-auth {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .box-auth h2 { color: #ff69b4; margin-bottom: 20px; }
        .box-auth input {
            padding: 10px;
            width: 200px;
            border: 2px solid #ffb6c1;
            border-radius: 8px;
            outline: none;
            text-align: center;
            font-size: 16px;
        }
        .box-auth button {
            padding: 10px 20px;
            background: #ff69b4;
            color: white;
            border: none;
            border-radius: 8px;
            margin-left: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        .box-auth button:hover { background: #ff1493; }
        .error-msg { color: red; margin-top: 10px; font-size: 14px; display: none; }

        /* --- 2. GIAO DIỆN CHÍNH (ẨN LÚC ĐẦU) --- */
        #main-content {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            perspective: 1000px; /* Tạo độ sâu cho thiệp */
        }

        /* --- 3. THIỆP 3D VÀ BÁNH --- */
        .card {
            width: 300px;
            height: 350px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s ease;
            cursor: pointer;
        }
        .card.open {
            transform: rotateY(-140deg);
            margin-left: 150px;
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card-front {
            background: #ff69b4;
            color: white;
            z-index: 2;
        }
        .card-front h1 { font-size: 24px; text-align: center; }
        .card-front p { margin-top: 20px; font-size: 14px; background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 20px;}
        
        .card-back {
            background: #fff0f5;
            transform: rotateY(180deg);
            z-index: 1;
        }

        /* Bánh sinh nhật bên trong thiệp (xuất hiện khi mở) */
        .cake-container {
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
            flex-direction: column;
            align-items: center;
            margin-top: -300px; /* Đẩy lên vị trí trung tâm sau khi thiệp mở lệch */
            z-index: 5;
        }
        /* Vẽ bánh bằng CSS */
        .cake {
            width: 150px;
            height: 100px;
            background: #f4c2c2;
            border-radius: 10px 10px 0 0;
            position: relative;
            margin-top: 40px;
            box-shadow: inset 0 10px 0 #f08080, 0 5px 15px rgba(0,0,0,0.1);
        }
        .cake::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 20px;
            background: #fff;
            top: 30px; left: 0;
            box-shadow: 0 25px 0 #fff;
        }
        .candle {
            width: 12px;
            height: 40px;
            background: linear-gradient(to right, #6fa8dc, #9fc5e8);
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 3px;
        }
        .flame {
            width: 12px;
            height: 18px;
            background: #ffaa00;
            border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
            position: absolute;
            top: -22px;
            left: 0;
            animation: flicker 0.5s ease-in-out infinite alternate;
            box-shadow: 0 0 10px #ffaa00;
        }
        @keyframes flicker {
            0% { transform: scale(1); }
            100% { transform: scale(1.1) rotate(2deg); }
        }
        .candle.off .flame {
            display: none;
        }

        /* Nút thổi nến */
        .btn-blow {
            margin-top: 20px;
            padding: 12px 25px;
            background: #ff1493;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
            transition: transform 0.2s;
        }
        .btn-blow:hover { transform: scale(1.05); }

        /* --- 4. LỜI CHÚC VÀ PHÁO HOA --- */
        .wishes-box {
            display: none;
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 90%;
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 6;
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .wishes-box h2 { color: #ff1493; margin-bottom: 15px; font-size: 24px;}
        .wishes-box p { color: #555; font-size: 18px; line-height: 1.5; font-weight: 500;}

        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9;
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="box-auth">
            <h2>Nhập mã để mở quà ẩn nè! 😉</h2>
            <input type="text" id="code-input" placeholder="Nhập code vào đây...">
            <button onclick="checkCode()">Mở</button>
            <p class="error-msg" id="error-msg">Sai code rồi cậu ơi, thử lại xem nào! 👀</p>
        </div>
    </div>

    <div id="main-content">
        <div class="card" id="birthday-card" onclick="openCard()">
            <div class="card-front">
                <h1>Gửi Minh Trang... 🌸</h1>
                <p>Bấm vào để mở thiệp nha</p>
            </div>
            <div class="card-back">
                </div>
        </div>

        <div class="cake-container" id="cake-container">
            <div class="cake">
                <div class="candle" id="candle">
                    <div class="flame"></div>
                </div>
            </div>
            <button class="btn-blow" id="blow-btn" onclick="blowCandle()">Thổi nến ước nguyện 🎂</button>
        </div>

        <div class="wishes-box" id="wishes-box">
            <h2>Chúc mừng sinh nhật Minh Trang 🎉</h2>
            <p>Chúc những điều tốt nhất sẽ đến với cậu!</p>
        </div>
    </div>

    <canvas id="fireworksCanvas"></canvas>

    <script>
        // Kiểm tra mã Code
        function checkCode() {
            const codeInput = document.getElementById('code-input').value;
            // Nhập đúng code (chấp nhận cả viết hoa viết thường)
            if (codeInput.trim().toLowerCase() === "mtr cte :d") {
                document.getElementById('auth-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('main-content').style.display = 'flex';
                }, 500);
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        // Mở thiệp và hiện bánh kem
        function openCard() {
            const card = document.getElementById('birthday-card');
            if(!card.classList.contains('open')) {
                card.classList.add('open');
                
                // Hiện bánh kem từ từ sau khi thiệp mở ra
                setTimeout(() => {
                    const cakeContainer = document.getElementById('cake-container');
                    cakeContainer.style.display = 'flex';
                    setTimeout(() => cakeContainer.style.opacity = '1', 50);
                }, 800);
            }
        }

        // Thổi nến, kích hoạt pháo hoa và hiện lời chúc
        function blowCandle() {
            // Tắt nến
            document.getElementById('candle').classList.add('off');
            document.getElementById('blow-btn').style.display = 'none';
            
            // Ẩn thiệp và bánh đi để nhường chỗ cho lời chúc phóng to
            setTimeout(() => {
                document.getElementById('birthday-card').style.display = 'none';
                document.getElementById('cake-container').style.display = 'none';
                
                // Hiện lời chúc lung linh
                document.getElementById('wishes-box').style.display = 'block';
                
                // Bắt đầu bắn pháo hoa
                initFireworks();
            }, 1000);
        }

        /* --- ĐOẠN CODE HIỆU ỨNG PHÁO HOA (CANVAS) --- */
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let fireworks = [];
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.targetY = Math.random() * (canvas.height * 0.5);
                this.speed = 5 + Math.random() * 5;
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
            }
            update() {
                this.y -= this.speed;
                if (this.y <= this.targetY) {
                    createParticles(this.x, this.y, this.color);
                    return false;
                }
                return true;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 1 + Math.random() * 6;
                this.friction = 0.95;
                this.gravity = 0.1;
                this.alpha = 1;
                this.decay = 0.01 + Math.random() * 0.02;
            }
            update() {
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.alpha -= this.decay;
                return this.alpha > 0;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 60; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function initFireworks() {
            resizeCanvas();
            animate();
            // Cứ mỗi 500ms tạo ra 1 quả pháo mới
            setInterval(() => {
                if (fireworks.length < 5) {
                    fireworks.push(new Firework());
                }
            }, 500);
        }

        function animate() {
            ctx.fillStyle = 'rgba(255, 228, 225, 0.2)'; // Tạo hiệu ứng đuôi mờ cho pháo hoa trên nền hồng
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            fireworks = fireworks.filter(f => {
                f.draw();
                return f.update();
            });

            particles = particles.filter(p => {
                p.draw();
                return p.update();
            });

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
